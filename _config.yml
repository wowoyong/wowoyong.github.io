# The Site Configuration

# Import the theme
theme: jekyll-theme-chirpy

lang: ko-KR
timezone: Asia/Seoul

title: AI 데일리
tagline: 매일 올라오는 AI 뉴스 & 주목할 GitHub 프로젝트 모음

description: >-
  AI 관련 최신 뉴스와 주목할 만한 GitHub 프로젝트를 매일 요약 정리합니다.
  LLM, 생성형 AI, 오픈소스 AI 도구 등 AI 생태계 전반을 다룹니다.

url: "https://wowoyong.github.io"

github:
  username: wowoyong

social:
  name: wowoyong
  email: ""
  links:
    - https://github.com/wowoyong

theme_mode: dark

toc: true

comments:
  provider:

pwa:
  enabled: true
  cache:
    enabled: true

paginate: 10

baseurl: ""

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
